server {
    listen 80;
    server_name _;

    root /opt/psv-tracker;
    index index.php index.html;

    # Allow ad image uploads through; the real cap is the 2 MB check in
    # ads_lib.php. Headroom here covers multipart overhead / future uploads
    # without leaving the request size unbounded.
    client_max_body_size 8m;

    # Never serve these over the web
    location ~ /\.            { deny all; }
    location = /api/config.php { deny all; }
    location = /api/config.sample.php { deny all; }
    location ^~ /schema/      { deny all; }
    location ~ \.sql$         { deny all; }
    location ^~ /admin/partials/ { deny all; }
    location ^~ /owner/partials/ { deny all; }
    location ^~ /bin/         { deny all; }

    # Uploaded ad images live outside the repo so they survive a re-clone.
    # ^~ keeps the PHP regex below from ever executing anything served here.
    location ^~ /uploads/ {
        alias /var/lib/psv-tracker/uploads/;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:PHP_FPM_SOCK;
    }
}
