server {
    listen 80;
    server_name _;

    root /opt/psv-tracker;
    index index.php index.html;

    # Never serve these over the web
    location ~ /\.            { deny all; }
    location = /api/config.php { deny all; }
    location = /api/config.sample.php { deny all; }
    location ^~ /schema/      { deny all; }
    location ~ \.sql$         { deny all; }
    location ^~ /admin/partials/ { deny all; }
    location ^~ /bin/         { deny all; }

    location / {
        try_files $uri $uri/ =404;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:PHP_FPM_SOCK;
    }
}
